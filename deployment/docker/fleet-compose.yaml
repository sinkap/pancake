# pancake-fleet-server local development stack.
#
# Brings up:
#   pancake-fleet-db      PostgreSQL 16             :5433 (host)
#   pancake-fleet-server  HTTP REST + gRPC API      :8080 (HTTP), :8081 (gRPC)
#
# Usage from the repo root:
#   docker compose -f deployment/docker/fleet-compose.yaml up -d --build
#
# Schema is auto-migrated on first server start.
# State persists in the pancake-fleet-db-data volume.

services:
  pancake-fleet-db:
    image: postgres:16-alpine
    container_name: pancake-fleet-db
    environment:
      POSTGRES_DB: pancake_fleet
      POSTGRES_USER: pancake
      POSTGRES_PASSWORD: pancake-dev
    ports:
      - "5433:5432"        # 5433 on host to avoid clashing with a local postgres
    volumes:
      - pancake-fleet-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pancake -d pancake_fleet"]
      interval: 5s
      timeout: 5s
      retries: 10

  pancake-fleet-server:
    build:
      context: ../..
      dockerfile: deployment/docker/fleet-server/Dockerfile
    image: pancake-fleet-server:local
    container_name: pancake-fleet-server
    # Run as the operator UID so we can read pancake-host-state/client.key
    # (mode 0600 on the host). Default to UID 1000 — override with
    # `UID=$(id -u) docker compose -f fleet-compose.yaml up` if different.
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      pancake-fleet-db:
        condition: service_healthy
    ports:
      - "8080:8080"        # HTTP REST + UI
      - "8081:8081"        # gRPC FleetManager
    # Make the QEMU host's loopback reachable as host.docker.internal so
    # the poller can attest VMs that QEMU port-forwards to the host (the
    # local-dev case). Enroll such VMs with internal_ip=host.docker.internal
    # instead of 127.0.0.1.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://pancake:pancake-dev@pancake-fleet-db:5432/pancake_fleet?sslmode=disable
    volumes:
      # Bind-mount operator mTLS materials so the poller can talk to
      # pancaked. Pass --attest-{ca,cert,key}-file in command below.
      - ../../pancake-host-state:/var/lib/pancake-host-state:ro
    command:
      - "-http-addr=:8080"
      - "-grpc-addr=:8081"
      - "-web-ui=/var/lib/pancake-fleet-ui"
      - "-attest-ca-file=/var/lib/pancake-host-state/step-root.crt"
      - "-attest-cert-file=/var/lib/pancake-host-state/client.crt"
      - "-attest-key-file=/var/lib/pancake-host-state/client.key"
      - "-attest-server-name=pancake-demo"
      - "-attest-interval=1h"
      - "-attest-tofu"

volumes:
  pancake-fleet-db-data:
