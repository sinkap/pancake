apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-server-sa
  namespace: pancake-fleet
  annotations:
    # Bind this KSA to the GSA Terraform created so the Cloud SQL Proxy
    # can authenticate without a static key.json.
    iam.gke.io/gcp-service-account: pancake-fleet-server@PROJECT_ID.iam.gserviceaccount.com
