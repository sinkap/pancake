# Template — DO NOT commit real secret material to git.
# Use `kubectl create secret generic ...` or seal these with kubeseal /
# Secret Manager CSI driver before applying.
apiVersion: v1
kind: Secret
metadata:
  name: cloudsql-db-credentials
  namespace: pancake-fleet
type: Opaque
stringData:
  # postgres://pancake:PASSWORD@127.0.0.1:5432/pancake_fleet?sslmode=disable
  # The host is 127.0.0.1 because the cloud-sql-proxy sidecar tunnels
  # to the real DB over a Unix-or-TCP socket.
  connection-string: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: pancake-mtls
  namespace: pancake-fleet
type: Opaque
stringData:
  ca.crt:     REPLACE_ME
  client.crt: REPLACE_ME
  client.key: REPLACE_ME
