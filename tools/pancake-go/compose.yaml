# Brings up the pancake orchestrator-side stack:
#
#   pancake-ca-server     step-ca, ACME-tpm provisioner       :8443
#   pancake-build-server  gRPC layer cache + builder          :7879
#   pancake-sign          UKI + manifest signing service      :7880
#
# Unified CA architecture: single step-ca for mTLS certs. TPM attestation
# uses dev EK CA (mimics manufacturer roots) with local AK cert issuance.
#
# Shared volume `pancake-trust` carries step-ca's root cert and dev EK CA,
# written by pancake-ca-server's init.sh, consumed RO by pancake-build-server
# when baking the orch-config layer.
#
# Run from this directory:
#
#   docker compose up -d --build
#
# State persists in named volumes; `docker compose down -v` wipes it.

services:
  # Tiny init: docker volumes default to root:root mode 0755 which
  # blocks the unprivileged step / attestca users from writing.
  # Chmod world-writable on first start so init.sh can publish the
  # root cert.
  pancake-trust-init:
    image: busybox
    command: ["chmod", "0777", "/pancake-trust"]
    volumes:
      - pancake-trust:/pancake-trust
    restart: "no"

  pancake-ca-server:
    build:
      context: ./ca-server
    image: pancake-ca-server:local
    container_name: pancake-ca-server
    depends_on:
      pancake-trust-init:
        condition: service_completed_successfully
    ports:
      - "8443:8443"
    environment:
      PANCAKE_CA_DNS: "pancake-ca-server,localhost,127.0.0.1,10.0.2.2"
      PANCAKE_CA_NAME: "pancake-demo"
      PANCAKE_HOST_STATE: /var/lib/pancake-host-state
      PANCAKE_HOST_UID: "${UID:-1000}"
    volumes:
      - pancake-ca-state:/home/step
      # Writes /pancake-trust/trust-root.crt on first boot so the
      # build server can pick it up without HTTP fetch / operator
      # extraction. See ca-server/init.sh.
      - pancake-trust:/pancake-trust
      # Bind-mount for operator-visible host state: JWK password,
      # trust roots, ca-url. Replaces docker exec/cp round-trips.
      - ./pancake-host-state:/var/lib/pancake-host-state

  pancake-build-server:
    build:
      # Wider context: server/Dockerfile bakes in the canonical
      # pancake / pancaked / mount-overlay / pivot-root binaries
      # (sourced from initramfs/ and the repo root) as
      # bundled-binary fallbacks for recipes that don't get an
      # operator-uploaded override blob.
      context: ../..
      dockerfile: tools/pancake-go/server/Dockerfile
    image: pancake-build-server:local
    container_name: pancake-build-server
    # mmdebstrap (chroot + bind mounts) and veritysetup (device
    # mapper) need CAP_SYS_ADMIN. --privileged is the easy button;
    # see server/Dockerfile for a tighter capability set.
    privileged: true
    ports:
      - "7879:7879"
    volumes:
      - pancake-build-cache:/var/lib/pancake-build-server
      # Read-only mount of the shared trust volume so bakeOrchConfig
      # can read trust-root.crt without HTTP fetch / blob upload.
      - pancake-trust:/var/lib/pancake-build-server/trust:ro
      # Bind /dev so losetup -f sees the host's loop devices for
      # efi.PackEFIDisk's GPT + ESP partitioning. --privileged alone
      # snapshots /dev at start time but doesn't share new loop
      # allocations made on the host afterwards.
      - /dev:/dev
    command:
      - "-listen=:7879"
      - "-cache=/var/lib/pancake-build-server"
      - "-trust-dir=/var/lib/pancake-build-server/trust"
      - "-sign-addr=http://pancake-sign:7880"
    depends_on:
      - pancake-ca-server
      - pancake-sign

  pancake-sign:
    build:
      context: ../..
      dockerfile: tools/pancake-go/sign-server/Dockerfile
    image: pancake-sign:local
    container_name: pancake-sign
    ports:
      - "7880:7880"
    volumes:
      - pancake-sign-state:/var/lib/pancake-sign

volumes:
  pancake-ca-state:
  pancake-build-cache:
  pancake-sign-state:
  pancake-trust:
