# Brings up the pancake orchestrator-side stack:
#
#   pancake-ca-server     step-ca, ACME-tpm provisioner       :8443
#   pancake-attest-ca        TPM AK Attestation CA               :8444
#   pancake-build-server  gRPC layer cache + builder          :7879
#   pancake-sign          UKI + manifest signing service      :7880
#
# Run from this directory:
#
#   docker compose up -d --build
#
# State persists in named volumes; `docker compose down -v` wipes it.
#
# The three services are independent at startup — step-ca's
# ACME-tpm provisioner does not need attest-ca's root at boot time;
# the operator wires it in later via `pancake ca-server
# enroll-device` (or by setting attestationRoots in ca.json).

services:
  pancake-ca-server:
    build:
      context: ./ca-server
    image: pancake-ca-server:local
    container_name: pancake-ca-server
    ports:
      - "8443:8443"
    environment:
      # Service name included so other containers can reach the CA
      # over the compose-provided network without TLS hostname
      # mismatches.
      PANCAKE_CA_DNS: "pancake-ca-server,localhost,127.0.0.1"
      PANCAKE_CA_NAME: "pancake-demo"
    volumes:
      - pancake-ca-state:/home/step

  pancake-attest-ca:
    build:
      context: .
      dockerfile: attest-ca/Dockerfile
    image: pancake-attest-ca:local
    container_name: pancake-attest-ca
    ports:
      - "8444:8444"
    volumes:
      - pancake-attest-ca-state:/home/attest-ca

  pancake-build-server:
    build:
      # Wider context: server/Dockerfile bakes in the canonical
      # pancake / pancaked / mount-overlay / pivot-root binaries
      # (sourced from initramfs/ and the repo root) as
      # bundled-binary fallbacks for recipes that don't get an
      # operator-uploaded override blob.
      context: ../..
      dockerfile: tools/pancake-go/server/Dockerfile
    image: pancake-build-server:local
    container_name: pancake-build-server
    # mmdebstrap (chroot + bind mounts) and veritysetup (device
    # mapper) need CAP_SYS_ADMIN. --privileged is the easy button;
    # see server/Dockerfile for a tighter capability set.
    privileged: true
    ports:
      - "7879:7879"
    volumes:
      - pancake-build-cache:/var/lib/pancake-build-server
    # Route signing through pancake-sign so the build server holds
    # no private key. Compose-internal hostname; the docker network
    # provides DNS.
    command:
      - "-listen=:7879"
      - "-cache=/var/lib/pancake-build-server"
      - "-sign-addr=http://pancake-sign:7880"
    depends_on:
      - pancake-sign

  pancake-sign:
    build:
      context: ../..
      dockerfile: tools/pancake-go/sign-server/Dockerfile
    image: pancake-sign:local
    container_name: pancake-sign
    ports:
      - "7880:7880"
    volumes:
      - pancake-sign-state:/var/lib/pancake-sign

volumes:
  pancake-ca-state:
  pancake-attest-ca-state:
  pancake-build-cache:
  pancake-sign-state:
